name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: ${{ matrix.cfg.name }}
    runs-on: ubuntu-latest
    container: fedora:latest
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - name: default
            cc: clang
            cflags: "-O2 -g3 -fno-omit-frame-pointer -fno-optimize-sibling-calls"
            ldflags: ""
            build_dir: build-default
            env: {}
          - name: asan-ubsan
            cc: clang
            cflags: "-O1 -g3 -fno-omit-frame-pointer -fno-optimize-sibling-calls -fsanitize=address,undefined -fno-sanitize-recover=all"
            ldflags: "-fsanitize=address,undefined"
            build_dir: build-asan-ubsan
            env:
              ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1"
              UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
          - name: ubsan-only
            cc: clang
            cflags: "-O1 -g3 -fno-omit-frame-pointer -fno-optimize-sibling-calls -fsanitize=undefined -fno-sanitize-recover=all"
            ldflags: "-fsanitize=undefined"
            build_dir: build-ubsan-only
            env:
              UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y clang llvm meson ninja-build git compiler-rt diffutils
          clang --version
          llvm-symbolizer --version

      - name: Verify LLVM 21
        run: |
          # Extract major version number
          VER=$(clang --version | head -n1 | grep -oE 'version [0-9]+' | grep -oE '[0-9]+')
          if [ -z "$VER" ]; then
             # Try alternate format
             VER=$(clang --version | head -n1 | grep -oE 'clang version [0-9]+' | grep -oE '[0-9]+')
          fi
          
          # Fallback: just grep the number if the above failed
          if [ -z "$VER" ]; then
             VER=$(clang --version | head -n1 | grep -oE '[0-9]+\.' | head -n1 | cut -d. -f1)
          fi
          
          echo "Detected Clang version: $VER"
          if [ "$VER" -ne 21 ]; then
            echo "Error: Clang version 21 required, found $VER"
            exit 1
          fi

      - name: Build
        env:
          CC: ${{ matrix.cfg.cc }}
          CFLAGS: ${{ matrix.cfg.cflags }}
          LDFLAGS: ${{ matrix.cfg.ldflags }}
        run: |
          meson setup ${{ matrix.cfg.build_dir }}
          meson compile -C ${{ matrix.cfg.build_dir }}

      - name: Test
        env:
          ASAN_SYMBOLIZER_PATH: /usr/bin/llvm-symbolizer
          ASAN_OPTIONS: ${{ matrix.cfg.env.ASAN_OPTIONS }}
          UBSAN_OPTIONS: ${{ matrix.cfg.env.UBSAN_OPTIONS }}
        run: |
          meson test -C ${{ matrix.cfg.build_dir }} --print-errorlogs

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.cfg.name }}
          path: ${{ matrix.cfg.build_dir }}/meson-logs/testlog.txt

  install-uninstall-check:
    name: install-uninstall-check
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y meson ninja-build pkgconf-pkg-config gcc

      - name: Install to staging prefix
        run: |
          meson setup build-install --prefix /usr
          meson compile -C build-install
          meson install -C build-install --destdir "$PWD/stage"

          test -f "$PWD/stage/usr/include/jstok.h"
          PC_FILE=$(find "$PWD/stage" -type f -name jstok.pc | head -n1)
          test -n "$PC_FILE"
          PC_DIR=$(dirname "$PC_FILE")

          PKG_CONFIG_PATH="$PC_DIR" pkg-config --exists jstok
          PKG_CONFIG_PATH="$PC_DIR" pkg-config --cflags jstok | grep -q -- "-I"

      - name: Uninstall verification (staged prefix cleanup)
        run: |
          PC_DIR=$(dirname "$(find "$PWD/stage" -type f -name jstok.pc | head -n1)")
          rm -rf "$PWD/stage"
          test ! -e "$PWD/stage/usr/include/jstok.h"

          if PKG_CONFIG_PATH="$PC_DIR" pkg-config --exists jstok; then
            echo "jstok should not resolve after staged uninstall cleanup"
            exit 1
          fi

  fuzz-smoke:
    name: fuzz-smoke
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y clang llvm meson ninja-build compiler-rt

      - name: Build fuzz target
        env:
          CC: clang
        run: |
          meson setup build-fuzz
          meson compile -C build-fuzz fuzz_jstok

      - name: Run fuzz budget
        run: |
          # Keep CI runtime bounded while still exercising fuzz target in every PR.
          ./build-fuzz/fuzz_jstok -max_total_time=20
